<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="/resources/images/logo.png">
    <title>1X2S</title>
    <link rel="stylesheet" href="/assets/css/core/fonts.css">
</head>
<body>

<style>
body{
background-color: black;
color: black;
overflow-x: hidden;
margin: 0;
padding: 0;
}

.section{
height: 100vh;
width: 100%;
align-items: center;
align-content: center;
justify-content: center ;
display: flex;
position: relative;
flex-direction: column;
}

.section-content__parent{
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
width: 100%;
height: 100%;
}

.section-content__content{
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
width: 100%;
height: 100%;
}

.section-content__content-wrapper{
display: flex;
flex-direction: column;
align-items: flex-start;
justify-content: center;
text-align: left;
width: 20%;
height: auto;

}

.section-content__content-wrapper span{
font-family: montserrat;
font-size: 1.2em;
font-weight: 400;
color: #3e3e3e;
}
.page-break__divider{
width: 30%;
height: 2px;
background: rgba(255, 255, 255, 0.08);
margin: 10px 0;
position: relative;
overflow: hidden;
border-radius: 999px;
}

.page-break__divider::after{
content: "";
position: absolute;
left: 0;
top: 0;
height: 100%;
width: 100%;
border-radius: inherit;
background: #282828;
animation: divider-loading 2s ease-in-out infinite;
transform-origin: left center;
transition: all 0.3s ease;
}
.page-break__divider:hover::after{
left: 100%;
transition: all 0.3s ease;
}

@keyframes divider-loading{
0%{
left: -100%;
}
50%{
left: 0;
}
100%{
left: 100%;
}


}

.section-content__content-wrapper h2{
font-family: montserrat;
font-size: 1.5em;
font-weight: 400;
color: #ffffff;
}

.section-content__content-wrapper a{
font-family: montserrat;
font-size: 1.2em;
font-weight: 400;
color: #3e3e3e;
text-decoration: none;
}
.section-content__content-wrapper a:hover{
color: #ffffff;
transition: all 0.3s ease;
}
.section-content__content-wrapper a:hover::after{
content: "";
width: 100%;
height: 1px;
background: #ffffff;
transition: all 0.3s ease;
}
</style>


<nav>
    <!-- Navbar / for pc devices -->
    <div id="navbar"></div>
    <script src="/assets/js/components/navbar.js"></script>
    <link rel="stylesheet" href="/assets/css/components/navbar.css">
    
    <div class="scroll-progress" id="progressBar"></div>
    <script>
        const progressBar = document.getElementById('progressBar');
        window.addEventListener('scroll', () => {
          const scrollTop = window.scrollY;
          const docHeight = document.body.scrollHeight - window.innerHeight;
          const scrollPercent = (scrollTop / docHeight) * 100;
          progressBar.style.width = scrollPercent + '%';
        });
      </script>
</nav>
<mobilenav>
  <!-- Navbar / for mobile devices -->
  <div id="mobilenavbar"></div>
  <script src="/assets/js/components/mobile-navbar.js"></script>
  <link rel="stylesheet" href="/assets/css/components/mobile-navbar.css">
</mobilenav>  

<section class="section" id="section">

<span style="position: absolute; top: 10px; left: 10px; color: #3e3e3e; font-family: monospace; font-size: 1.2em; font-weight: 400;">404/ Content Unavailable</span>

<div class="section-content__parent">

  <div class="section-content__content">

    <div class="section-content__content-wrapper">
      <span>404</span>
      <div class="page-break__divider"></div>
    </div>

    <div class="section-content__content-wrapper">
      <h2>Page was not found or does not exist.</h2>
    </div>

    <div class="section-content__content-wrapper">
      <a href="/">Return to Home</a>
    </div>

  </div>




</section>


</body>
